<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Green container background with rounded corners -->
  <rect width="128" height="128" rx="16" fill="#10B981" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4"/>
  
  <!-- Glow shadow effect -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(16, 185, 129, 0.3)"/>
    </filter>
  </defs>
  
  <!-- Container with shadow -->
  <rect width="128" height="128" rx="16" fill="#10B981" stroke="rgba(255, 255, 255, 0.1)" stroke-width="4" filter="url(#shadow)"/>
  
  <!-- Lightning bolt icon centered (64px icon in 128px container = 32px padding) -->
  <g transform="translate(32, 32) scale(2.667)" filter="url(#glow)">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="black" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
