<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Green container background -->
  <rect width="32" height="32" rx="4" fill="#10B981" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1"/>
  <!-- Shadow effect -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Lightning bolt icon centered (16px icon in 32px container = 8px padding) -->
  <g transform="translate(8, 8) scale(0.667)" filter="url(#glow)">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="black" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
